<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Data Engineering Portfolio - AWS, Python, Spark, SQL. High-performance data pipelines and architecture.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://jorgendetoussaint.github.io/">

  <meta property="og:title" content="Jorgen De Toussaint — Data Engineering Portfolio">
  <meta property="og:description" content="Data Engineering Portfolio - AWS, Python, Spark, SQL. High-performance data pipelines and architecture.">
  <meta property="og:url" content="https://jorgendetoussaint.github.io/">
  <meta property="og:type" content="website">

  <title>Jorgen De Toussaint — Data Engineering</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:           #0a0b10;
      --bg-mid:       #0e1020;
      --indigo:       #3f51b5;
      --indigo-hi:    #5c6fd6;
      --indigo-lo:    rgba(63, 81, 181, 0.14);
      --indigo-glow:  rgba(63, 81, 181, 0.45);
      --indigo-rim:   rgba(63, 81, 181, 0.65);
      --text:         #c8ccdc;
      --text-dim:     #5a607a;
      --mono:         'Share Tech Mono', monospace;
      --sans:         'Rajdhani', sans-serif;
      --card-w:       360px;
      --card-pad-x:   2.25rem;
      --card-pad-y:   2.5rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      font-size: 16px;
    }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(63,81,181,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63,81,181,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.75) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 5vw, 3rem);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, min(var(--card-w), 100%));
      gap: 1.25rem;
      width: 100%;
      max-width: calc(var(--card-w) * 2 + 1.25rem);
    }

    @media (max-width: 780px) {
      .card-grid { grid-template-columns: min(var(--card-w), 100%); }
    }

    .heading {
      font-family: var(--mono);
      font-size: clamp(.6rem, 2vw, .75rem);
      letter-spacing: .45em;
      color: var(--indigo-hi);
      text-transform: uppercase;
      margin-bottom: clamp(1.25rem, 3vh, 2rem);
      opacity: 0;
      animation: fadeDown .7s .2s forwards;
    }

    .card {
      position: relative;
      width: 100%;
      background: var(--bg-mid);
      border: 1px solid var(--indigo-rim);
      border-radius: 2px;
      box-shadow:
        0 0 0 1px rgba(63,81,181,.15),
        0 0 18px rgba(63,81,181,.18),
        0 4px 32px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.04);
      padding: var(--card-pad-y) var(--card-pad-x);
      text-decoration: none;
      display: block;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp .7s .45s forwards;
      transition:
        box-shadow .4s ease,
        border-color .4s ease,
        transform .4s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(63,81,181,.1) 0%, transparent 55%);
      opacity: 0;
      transition: opacity .4s ease;
    }

    .card:hover {
      border-color: var(--indigo-hi);
      box-shadow:
        0 0 0 1px rgba(92,111,214,.4),
        0 0 30px var(--indigo-glow),
        0 0 70px rgba(63,81,181,.18),
        0 8px 40px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.07);
      transform: translateY(-3px);
    }

    .card:hover::before { opacity: 1; }

    .card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 22px; height: 22px;
      border-top: 2px solid var(--indigo-hi);
      border-right: 2px solid var(--indigo-hi);
    }

    .corner-bl {
      position: absolute;
      bottom: 0; left: 0;
      width: 22px; height: 22px;
      border-bottom: 2px solid rgba(63,81,181,.45);
      border-left: 2px solid rgba(63,81,181,.45);
      border-radius: 0 0 0 2px;
      pointer-events: none;
    }

    .card-label {
      font-family: var(--mono);
      font-size: .6rem;
      letter-spacing: .4em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .card-label::before {
      content: '';
      display: inline-block;
      width: 18px; height: 1px;
      background: var(--indigo-hi);
      flex-shrink: 0;
    }

    .card-title {
      font-family: var(--sans);
      font-size: clamp(1.35rem, 5vw, 1.85rem);
      font-weight: 600;
      letter-spacing: .06em;
      color: #e4e7f5;
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }

    .card-title span { color: var(--indigo-hi); }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--indigo) 0%, transparent 100%);
      margin-bottom: 1.5rem;
      opacity: .5;
    }

    .card-stack {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem .6rem;
    }

    .tag {
      font-family: var(--mono);
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: .25rem .5rem;
      border: 1px solid rgba(63,81,181,.3);
      border-radius: 1px;
      box-shadow: inset 0 0 6px rgba(63,81,181,.06);
      transition: color .25s, border-color .25s, box-shadow .25s;
    }

    .card:hover .tag {
      color: var(--text);
      border-color: rgba(92,111,214,.6);
      box-shadow: inset 0 0 8px rgba(63,81,181,.15), 0 0 6px rgba(63,81,181,.12);
    }

    .card-arrow {
      position: absolute;
      bottom: 1.25rem; right: 1.5rem;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--indigo-hi);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .3s, transform .3s;
    }

    .card:hover .card-arrow { opacity: 1; transform: translateX(0); }

    .card--linkedin {
      animation-delay: .6s;
    }

    .card--linkedin .card::after,
    .card--linkedin.card::after {
      border-color: #0a66c2;
    }

    .card--linkedin .corner-bl {
      border-color: rgba(10,102,194,.45);
    }

    .card--linkedin:hover {
      border-color: #1d7fc4;
      box-shadow:
        0 0 0 1px rgba(10,102,194,.4),
        0 0 30px rgba(10,102,194,.45),
        0 0 70px rgba(10,102,194,.15),
        0 8px 40px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.07);
    }

    .card--linkedin::after {
      border-color: #1d7fc4;
    }

    .card--linkedin .card-arrow { color: #1d7fc4; }

    .card--linkedin .card-label::before { background: #1d7fc4; }

    .card--linkedin .card-title span { color: #1d7fc4; }

    .card--linkedin .divider { background: linear-gradient(90deg, #0a66c2 0%, transparent 100%); }

    .card--linkedin .tag { border-color: rgba(10,102,194,.3); }

    .card--linkedin:hover .tag {
      border-color: rgba(29,127,196,.6);
      box-shadow: inset 0 0 8px rgba(10,102,194,.15), 0 0 6px rgba(10,102,194,.12);
    }

    .card--linkedin::before {
      background: linear-gradient(135deg, rgba(10,102,194,.1) 0%, transparent 55%);
    }

    .li-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: .3rem;
      vertical-align: middle;
      opacity: .55;
      fill: #1d7fc4;
      flex-shrink: 0;
    }
    .footer {
      margin-top: clamp(1.25rem, 3vh, 2rem);
      font-family: var(--mono);
      font-size: .55rem;
      letter-spacing: .35em;
      color: var(--text-dim);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp .7s .85s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 360px) {
      :root { --card-pad-x: 1.25rem; --card-pad-y: 1.75rem; }
      .card-title { font-size: 1.2rem; }
    }

    @media (min-width: 361px) and (max-width: 480px) {
      :root { --card-pad-x: 1.5rem; --card-pad-y: 2rem; }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      :root { --card-w: 400px; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      :root { --card-w: 420px; }
    }

    @media (min-width: 1920px) {
      :root { --card-w: 440px; }
      html { font-size: 18px; }
    }

    @media (max-width: 480px) and (min-height: 800px) {
      .stage { justify-content: center; padding-top: 0; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      :root { --card-pad-y: 1.25rem; }
      .stage { min-height: 100svh; justify-content: center; }
      .heading { margin-bottom: .75rem; }
      .footer  { margin-top: .75rem; }
      .card-title { margin-bottom: 1rem; }
      .divider    { margin-bottom: 1rem; }
    }

    @media (min-width: 600px) and (max-width: 900px) and (min-height: 1000px) {
      :root { --card-w: 460px; --card-pad-x: 2.5rem; --card-pad-y: 2.75rem; }
      .card-title { font-size: 2rem; }
      .heading { font-size: .8rem; }
    }

    /* Respects OS-level reduced motion preference (accessibility) */
    @media (prefers-reduced-motion: reduce) {
      .card, .heading, .footer { animation: none; opacity: 1; }
      .card { transition: none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <p class="heading">Data Engineering</p>

    <div class="card-grid">
      <a class="card" href="https://github.com/JorgenDeToussaint" target="_blank" rel="noopener noreferrer" aria-label="Portfolio and GitHub — JorgenDeToussaint">
        <p class="card-label">portfolio / github</p>
        <h1 class="card-title">Jorgen<br><span>De Toussaint</span></h1>
        <div class="divider"></div>
        <div class="card-stack">
          <span class="tag">AWS</span>
          <span class="tag">Spark</span>
          <span class="tag">Python</span>
          <span class="tag">SQL</span>
        </div>
        <span class="card-arrow">→ github.com</span>
        <span class="corner-bl" aria-hidden="true"></span>
      </a>

      <a class="card card--linkedin" href="https://www.linkedin.com/in/mateusz-zalewski-091608322/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn — Mateusz Zalewski">
        <p class="card-label">
          <svg class="li-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          linkedin
        </p>
        <p class="card-title">Mateusz<br><span>Zalewski</span></p>
        <div class="divider"></div>
        <div class="card-stack">
          <span class="tag">Data Engineer</span>
          <span class="tag">Connect</span>
        </div>
        <span class="card-arrow">→ linkedin.com</span>
        <span class="corner-bl" aria-hidden="true"></span>
      </a>
    </div>

    <p class="footer">github.com/JorgenDeToussaint</p>
  </main>
</body>
